# Kessel-in-a-Box: Insights Services (Phase 7)
# Real insights-rbac from quay.io/cloudservices/rbac
# Real insights-host-inventory from quay.io/cloudservices/insights-inventory
# RBAC replication path: management_outbox → Debezium CDC → Kafka → rbac-kafka-consumer → Relations API

services:
  # Redis - Required by insights-rbac for Celery broker and access cache
  rbac-redis:
    image: redis:7-alpine
    container_name: kessel-rbac-redis
    ports:
      - "${RBAC_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kessel-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Insights RBAC Migration - Runs Django migrations before the server starts
  insights-rbac-migrate:
    image: quay.io/cloudservices/rbac:${INSIGHTS_RBAC_TAG:-latest}
    container_name: insights-rbac-migrate
    entrypoint: ["/bin/sh", "-c", "cd /opt/rbac/rbac && python manage.py migrate --noinput"]
    environment:
      DEVELOPMENT: "True"
      DJANGO_READ_DOT_ENV_FILE: "True"
      DATABASE_SERVICE_NAME: POSTGRES_SQL
      DATABASE_ENGINE: postgresql
      DATABASE_NAME: rbac
      DATABASE_HOST: postgres-rbac
      DATABASE_PORT: "5432"
      DATABASE_USER: rbac
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_SQL_SERVICE_HOST: postgres-rbac
      POSTGRES_SQL_SERVICE_PORT: "5432"
    depends_on:
      postgres-rbac:
        condition: service_healthy
    networks:
      - kessel-network
    restart: "no"

  # Insights RBAC Service - Real RedHatInsights/insights-rbac
  # Image: quay.io/cloudservices/rbac
  # Writes relation events transactionally to management_outbox (Debezium picks them up)
  insights-rbac:
    image: quay.io/cloudservices/rbac:${INSIGHTS_RBAC_TAG:-latest}
    container_name: insights-rbac
    ports:
      - "${INSIGHTS_RBAC_PORT:-8080}:8080"
    environment:
      # Django / Gunicorn
      DEVELOPMENT: "True"
      DJANGO_READ_DOT_ENV_FILE: "True"
      BYPASS_BOP_VERIFICATION: "True"
      API_PATH_PREFIX: /api/rbac
      PRINCIPAL_USER_DOMAIN: redhat

      # PostgreSQL database
      DATABASE_SERVICE_NAME: POSTGRES_SQL
      DATABASE_ENGINE: postgresql
      DATABASE_NAME: rbac
      DATABASE_HOST: postgres-rbac
      DATABASE_PORT: "5432"
      DATABASE_USER: rbac
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_SQL_SERVICE_HOST: postgres-rbac
      POSTGRES_SQL_SERVICE_PORT: "5432"

      # Redis (Celery broker + access cache)
      REDIS_HOST: rbac-redis

      # V2 API / Workspaces
      V2_APIS_ENABLED: "True"
      V2_READ_ONLY_API_MODE: "False"
      V2_BOOTSTRAP_TENANT: "True"
      WORKSPACE_HIERARCHY_DEPTH_LIMIT: "5"
      WORKSPACE_ORG_CREATION_LIMIT: "20000000"

      # Kafka — outbox writes are enabled via REPLICATION_TO_RELATION_ENABLED=true
      # which makes RBAC use OutboxReplicator (writes to management_outbox).
      # Debezium picks up from outbox → Kafka → insights-rbac-kafka-consumer → Relations API.
      KAFKA_ENABLED: "true"
      KAFKA_SERVERS: "kafka:29092"
      REPLICATION_TO_RELATION_ENABLED: "true"

      # Allowed apps for role creation
      ROLE_CREATE_ALLOW_LIST: "inventory,advisor,compliance,vulnerability,patch,ros,notifications,integrations,cost-management"
    depends_on:
      insights-rbac-migrate:
        condition: service_completed_successfully
      rbac-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/rbac/v1/status/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - kessel-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Insights RBAC Celery Worker - Async task processing
  insights-rbac-worker:
    image: quay.io/cloudservices/rbac:${INSIGHTS_RBAC_TAG:-latest}
    container_name: insights-rbac-worker
    entrypoint: ["/bin/sh", "-c", "cd /opt/rbac/rbac && celery --broker=redis://rbac-redis:6379/0 -A rbac.celery worker --loglevel=INFO"]
    environment:
      DEVELOPMENT: "True"
      DJANGO_READ_DOT_ENV_FILE: "True"
      DATABASE_SERVICE_NAME: POSTGRES_SQL
      DATABASE_ENGINE: postgresql
      DATABASE_NAME: rbac
      DATABASE_HOST: postgres-rbac
      DATABASE_PORT: "5432"
      DATABASE_USER: rbac
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_SQL_SERVICE_HOST: postgres-rbac
      POSTGRES_SQL_SERVICE_PORT: "5432"
      REDIS_HOST: rbac-redis
      KAFKA_ENABLED: "true"
      KAFKA_SERVERS: "kafka:29092"
      REPLICATION_TO_RELATION_ENABLED: "true"
    depends_on:
      insights-rbac:
        condition: service_healthy
    networks:
      - kessel-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Insights RBAC Kafka Consumer - Real rbac-kafka-consumer from insights-rbac image
  # Consumes: outbox.event.rbac-consumer-replication-event (produced by Debezium EventRouter)
  # Calls: kessel-relations-api gRPC :9000 to apply relation changes (add/remove)
  # Docs: https://github.com/RedHatInsights/insights-rbac/blob/master/docs/KAFKA_CONSUMER.md
  insights-rbac-kafka-consumer:
    image: quay.io/cloudservices/rbac:${INSIGHTS_RBAC_TAG:-latest}
    container_name: insights-rbac-kafka-consumer
    entrypoint: ["/bin/sh", "-c", "cd /opt/rbac/rbac && python manage.py launch-rbac-kafka-consumer"]
    volumes:
      # Minimal Clowder config — provides metricsPort (9100) so the consumer
      # can start its Prometheus server. DEVELOPMENT=True still controls DB/Kafka.
      - ../config/rbac-cdappconfig.json:/cdappconfig.json:ro
    environment:
      DEVELOPMENT: "True"
      DJANGO_READ_DOT_ENV_FILE: "True"
      DATABASE_SERVICE_NAME: POSTGRES_SQL
      DATABASE_ENGINE: postgresql
      DATABASE_NAME: rbac
      DATABASE_HOST: postgres-rbac
      DATABASE_PORT: "5432"
      DATABASE_USER: rbac
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_SQL_SERVICE_HOST: postgres-rbac
      POSTGRES_SQL_SERVICE_PORT: "5432"
      REDIS_HOST: rbac-redis

      # Clowder config — provides metricsPort for Prometheus server startup
      CLOWDER_ENABLED: "true"
      ACG_CONFIG: "/cdappconfig.json"

      # Kafka consumer config
      # AggregateTypes.RELATIONS = "relations-replication-event" in RBAC source,
      # so Debezium EventRouter routes to outbox.event.relations-replication-event
      KAFKA_ENABLED: "true"
      KAFKA_SERVERS: "kafka:29092"
      RBAC_KAFKA_CONSUMER_TOPIC: "outbox.event.relations-replication-event"
      RBAC_KAFKA_CONSUMER_GROUP_ID: "rbac-consumer-group"

      # Relations API — consumer calls this gRPC endpoint to apply relation changes
      REPLICATION_TO_RELATION_ENABLED: "true"
      RELATION_API_SERVER: kessel-relations-api:9000

      DJANGO_LOG_LEVEL: INFO
    depends_on:
      insights-rbac:
        condition: service_healthy
      kessel-relations-api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kessel-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Insights Host Inventory Migration - Runs Alembic migrations before the server starts
  insights-inventory-migrate:
    image: quay.io/cloudservices/insights-inventory:${INSIGHTS_INVENTORY_TAG:-latest}
    container_name: insights-inventory-migrate
    entrypoint: ["/bin/sh", "-c", "FLASK_APP=manage.py flask db upgrade"]
    environment:
      INVENTORY_DB_HOST: postgres-inventory
      INVENTORY_DB_PORT: "5432"
      INVENTORY_DB_NAME: inventory
      INVENTORY_DB_USER: inventory
      INVENTORY_DB_PASS: ${POSTGRES_PASSWORD:-secretpassword}
      INVENTORY_LOG_LEVEL: INFO
      CLOWDER_ENABLED: ""
      BYPASS_RBAC: "true"
      BYPASS_KESSEL: "true"
      BYPASS_UNLEASH: "true"
    depends_on:
      postgres-inventory:
        condition: service_healthy
    networks:
      - kessel-network
    restart: "no"

  # Insights Host Inventory Service - Real RedHatInsights/insights-host-inventory
  # Image: quay.io/cloudservices/insights-inventory
  # Triggers CDC: Inventory PostgreSQL → Debezium → Kafka → Inventory Consumer
  insights-host-inventory:
    image: quay.io/cloudservices/insights-inventory:${INSIGHTS_INVENTORY_TAG:-latest}
    container_name: insights-host-inventory
    command: ["python", "run_gunicorn.py"]
    ports:
      - "${INSIGHTS_INVENTORY_PORT:-8081}:8080"
    environment:
      # PostgreSQL Inventory database
      INVENTORY_DB_HOST: postgres-inventory
      INVENTORY_DB_PORT: "5432"
      INVENTORY_DB_NAME: inventory
      INVENTORY_DB_USER: inventory
      INVENTORY_DB_PASS: ${POSTGRES_PASSWORD:-secretpassword}

      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      # Local dev bypasses
      BYPASS_RBAC: "true"
      BYPASS_KESSEL: "true"
      BYPASS_UNLEASH: "true"

      # Logging
      INVENTORY_LOG_LEVEL: INFO

      # Disable Clowder (not running in ephemeral/CRC)
      CLOWDER_ENABLED: ""
    depends_on:
      insights-inventory-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - kessel-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Insights Host Inventory MQ Consumer (optional) - Consumes host ingress messages
  # Uncomment if hosts are created via Kafka ingress rather than direct API calls
  # insights-inventory-mq:
  #   image: quay.io/cloudservices/insights-inventory:${INSIGHTS_INVENTORY_TAG:-latest}
  #   container_name: insights-inventory-mq
  #   entrypoint: ["python3", "inv_mq_service.py"]
  #   environment:
  #     INVENTORY_DB_HOST: postgres-inventory
  #     INVENTORY_DB_PORT: "5432"
  #     INVENTORY_DB_NAME: inventory
  #     INVENTORY_DB_USER: inventory
  #     INVENTORY_DB_PASS: ${POSTGRES_PASSWORD:-secretpassword}
  #     KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  #     BYPASS_RBAC: "true"
  #     BYPASS_KESSEL: "true"
  #     BYPASS_UNLEASH: "true"
  #     INVENTORY_LOG_LEVEL: INFO
  #     CLOWDER_ENABLED: ""
  #   depends_on:
  #     insights-inventory-migrate:
  #       condition: service_completed_successfully
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - kessel-network
  #   restart: unless-stopped

networks:
  kessel-network:
    external: true
    name: kessel-network
