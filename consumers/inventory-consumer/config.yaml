# Kessel Inventory Consumer Configuration
# Stage: kessel-inventory-consumer-service
# Consumes Stage 1: outbox.event.hbi.hosts → kessel-inventory-api gRPC :9000
# Operations: ReportResource / DeleteResource (v1beta2)

consumer:
  # Kafka connection
  bootstrap-servers: ["kafka:29092"]

  # Commit frequency (commit every 300 messages)
  commit-modulo: 300

  # Note: Consumer group ID is hardcoded in official consumer as "kic"
  # Cannot be changed via config file

  # Stage topic: produced by hbi-outbox-connector watching hbi.outbox
  # Debezium EventRouter routes by aggregatetype=hosts → outbox.event.hbi.hosts
  topics:
    - outbox.event.hbi.hosts

  # Retry configuration
  retry-options:
    consumer-max-retries: -1          # Unlimited retries
    operation-max-retries: -1         # Unlimited operation retries
    backoff-factor: 5                 # Exponential backoff multiplier
    max-backoff-seconds: 30           # Maximum wait between retries

  # Kafka authentication (disabled for local dev)
  auth:
    enabled: false

# Inventory API client configuration
# Stage: calls kessel-inventory-api gRPC :9000 with ReportResource/DeleteResource (v1beta2)
client:
  enabled: true
  # gRPC endpoint (matches stage: kessel-inventory-api:9000)
  url: "kessel-inventory-api:9000"
  enable-oidc-auth: false             # No OAuth for local dev
  insecure-client: true               # Skip TLS verification for local dev

# Logging configuration
log:
  level: "info"
